{% extends "base.html" %}
{% block title %}Concorrentes — PriceRadar{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-bold">Concorrentes</h1>
    <a href="/dashboard" class="text-sm text-gray-500 hover:text-gray-300">&larr; Dashboard</a>
</div>

<!-- Add competitor form -->
<div class="card p-6 mb-8">
    <h2 class="font-semibold mb-4">Adicionar concorrente</h2>
    <form method="POST" action="/competitors"
          hx-post="/competitors"
          hx-target="#competitors-list"
          hx-swap="innerHTML"
          class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
        <div class="md:col-span-3">
            <label class="block text-xs text-gray-400 mb-1">Nome</label>
            <input type="text" name="name" required placeholder="Ex: Competitor X" class="input-field text-sm">
        </div>
        <div class="md:col-span-4">
            <label class="block text-xs text-gray-400 mb-1">URL da pagina de pricing</label>
            <input type="url" name="pricing_url" required placeholder="https://example.com/pricing" class="input-field text-sm">
        </div>
        <div class="md:col-span-3">
            <label class="block text-xs text-gray-400 mb-1">Seletor CSS (opcional)</label>
            <input type="text" name="css_selector" placeholder=".price, #plan-value" class="input-field text-sm">
        </div>
        <div class="md:col-span-2">
            <button type="submit" class="btn-primary w-full text-sm">+ Adicionar</button>
        </div>
    </form>
</div>

<!-- Competitors list -->
<h2 class="text-xl font-semibold mb-4">Monitorando ({{ competitors|length }})</h2>
<div id="competitors-list">
{% include "partials/competitor_list.html" %}
</div>
{% endblock %}
