{% extends "base.html" %}
{% block title %}Criar conta — PriceRadar{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="card p-8">
        <h2 class="text-2xl font-bold mb-6 text-center">Criar conta</h2>
        <form method="POST" action="/register" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" name="email" required class="input-field" placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Senha (min. 6 caracteres)</label>
                <input type="password" name="password" required minlength="6" class="input-field" placeholder="Sua senha">
            </div>
            <button type="submit" class="btn-primary w-full">Criar conta</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            Ja tem conta? <a href="/login" class="text-emerald-400 hover:underline">Fazer login</a>
        </p>
    </div>
</div>
{% endblock %}
