{% extends "base.html" %}
{% block title %}Login — PriceRadar{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="card p-8">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" name="email" required class="input-field" placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Senha</label>
                <input type="password" name="password" required class="input-field" placeholder="Sua senha">
            </div>
            <button type="submit" class="btn-primary w-full">Entrar</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            Nao tem conta? <a href="/register" class="text-indigo-400 hover:underline">Criar conta</a>
        </p>
    </div>
</div>
{% endblock %}
