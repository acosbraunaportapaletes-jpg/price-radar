{% extends "base.html" %}
{% block title %}Login - PriceRadar{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6">Login</h1>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm text-gray-400 mb-1">Email</label>
            <input type="email" name="email" required
                   class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Senha</label>
            <input type="password" name="password" required
                   class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500">
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition">
            Entrar
        </button>
    </form>
    <p class="text-sm text-gray-500 mt-4 text-center">
        Nao tem conta? <a href="{{ url_for('register') }}" class="text-indigo-400 hover:underline">Cadastre-se</a>
    </p>
</div>
{% endblock %}
